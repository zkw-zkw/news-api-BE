services:
  mysql:
    image: mysql:8.0
    container_name: news-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 051215
      MYSQL_DATABASE: news_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0
    container_name: news-redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: news-api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    environment:
      DATABASE_URL: mysql+aiomysql://root:051215@mysql:3306/news_app?charset=utf8mb4
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0

volumes:
  mysql_data: